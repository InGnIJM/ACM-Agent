version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acm-agent-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: acm_agent
      POSTGRES_USER: acm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acm -d acm_agent']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: acm-agent-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://acm:${DB_PASSWORD:-devpassword}@postgres:5432/acm_agent?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string-at-least-32-chars}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./python/agents:/app/python/agents
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acm-agent-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
